apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: "__CLOUDRUN_SERVICE__"
spec:
  template:
    metadata:
      annotations:
        autoscaling.knative.dev/minScale: "0"
        autoscaling.knative.dev/maxScale: "20"
        run.googleapis.com/cpu-throttling: "true"
        run.googleapis.com/execution-environment: gen2
        run.googleapis.com/cloudsql-instances: "__CLOUDSQL_INSTANCES__"
    spec:
      containerConcurrency: 80
      timeoutSeconds: 300
      serviceAccountName: "__SERVICE_ACCOUNT_EMAIL__"
      containers:
        - image: "__IMAGE_URI__"
          ports:
            - name: http1
              containerPort: 8080
          env:
            - name: DB_ADDRESS
              valueFrom:
                secretKeyRef:
                  name: nakama-db-address
                  key: latest
            - name: NAKAMA_SERVER_KEY
              valueFrom:
                secretKeyRef:
                  name: nakama-server-key
                  key: latest
            - name: NAKAMA_SESSION_ENCRYPTION_KEY
              valueFrom:
                secretKeyRef:
                  name: nakama-session-encryption-key
                  key: latest
            - name: NAKAMA_SESSION_REFRESH_ENCRYPTION_KEY
              valueFrom:
                secretKeyRef:
                  name: nakama-session-refresh-encryption-key
                  key: latest
            - name: NAKAMA_RUNTIME_HTTP_KEY
              valueFrom:
                secretKeyRef:
                  name: nakama-runtime-http-key
                  key: latest
            - name: NAKAMA_CONSOLE_USERNAME
              value: "admin"
            - name: NAKAMA_CONSOLE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: nakama-console-password
                  key: latest
            - name: PLATFORM_INTERNAL_KEY
              valueFrom:
                secretKeyRef:
                  name: platform-internal-key
                  key: latest
            - name: TPX_MAGIC_LINK_NOTIFY_SECRET
              valueFrom:
                secretKeyRef:
                  name: tpx-magic-link-notify-secret
                  key: latest
            - name: PLATFORM_IDENTITY_URL
              value: "__PLATFORM_IDENTITY_URL__"
            - name: PLATFORM_ACCOUNT_MAGIC_LINK_START_URL
              value: "__PLATFORM_ACCOUNT_MAGIC_LINK_START_URL__"
            - name: PLATFORM_ACCOUNT_MAGIC_LINK_COMPLETE_URL
              value: "__PLATFORM_ACCOUNT_MAGIC_LINK_COMPLETE_URL__"
            - name: PLATFORM_USERNAME_VALIDATE_URL
              value: "__PLATFORM_USERNAME_VALIDATE_URL__"
            - name: PLATFORM_ACCOUNT_MERGE_CODE_URL
              value: "__PLATFORM_ACCOUNT_MERGE_CODE_URL__"
            - name: PLATFORM_ACCOUNT_MERGE_REDEEM_URL
              value: "__PLATFORM_ACCOUNT_MERGE_REDEEM_URL__"
            - name: PLATFORM_TELEMETRY_EVENTS_URL
              value: "__PLATFORM_TELEMETRY_EVENTS_URL__"
            - name: GAME_ID
              value: "orbapacolypse"
            - name: LEADERBOARD_ID
              value: "orbapacolypse_high_scores"
            - name: USERNAME_CHANGE_COST_COINS
              value: "300"
            - name: USERNAME_CHANGE_COOLDOWN_SECONDS
              value: "300"
            - name: USERNAME_CHANGE_MAX_PER_DAY
              value: "3"
