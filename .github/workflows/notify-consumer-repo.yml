name: Notify Consumer Repo

on:
  release:
    types: [published]
  workflow_run:
    workflows: ["Godot Web Release + Pages"]
    types: [completed]
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Optional explicit release tag (for example: v1.2.3)"
        required: false
        default: ""
      target_repo:
        description: "Target repo in owner/name format"
        required: false
        default: "TeraPixelGames/terapixel.games"
      dispatch_event_type:
        description: "repository_dispatch event type"
        required: false
        default: "orbapacolypse_main_updated"

permissions:
  contents: read

jobs:
  dispatch:
    if: github.event_name != 'workflow_run' || (github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main')
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch update event
        shell: bash
        env:
          DISPATCH_TOKEN: ${{ secrets.CONSUMER_REPO_DISPATCH_TOKEN }}
          INPUT_RELEASE_TAG: ${{ inputs.release_tag }}
          INPUT_TARGET_REPO: ${{ inputs.target_repo }}
          INPUT_EVENT_TYPE: ${{ inputs.dispatch_event_type }}
          RELEASE_TAG_FROM_EVENT: ${{ github.event.release.tag_name }}
          RELEASE_TARGET_SHA: ${{ github.event.release.target_commitish }}
          WORKFLOW_RUN_HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
          SOURCE_REPO: ${{ github.repository }}
          SHA: ${{ github.sha }}
        run: |
          set -euo pipefail

          if [ -z "${DISPATCH_TOKEN:-}" ]; then
            echo "Missing required secret: CONSUMER_REPO_DISPATCH_TOKEN"
            exit 1
          fi

          TARGET_REPO="$INPUT_TARGET_REPO"
          if [ -z "$TARGET_REPO" ]; then
            TARGET_REPO="TeraPixelGames/terapixel.games"
          fi
          if [ -z "$TARGET_REPO" ]; then
            echo "Missing target repo (owner/name)."
            exit 1
          fi

          EVENT_TYPE="$INPUT_EVENT_TYPE"
          if [ -z "$EVENT_TYPE" ]; then
            EVENT_TYPE="orbapacolypse_main_updated"
          fi

          RELEASE_TAG="$INPUT_RELEASE_TAG"
          if [ -z "$RELEASE_TAG" ]; then
            RELEASE_TAG="$RELEASE_TAG_FROM_EVENT"
          fi
          if [ -z "$RELEASE_TAG" ]; then
            LATEST_JSON=$(curl -sS \
              -H "Accept: application/vnd.github+json" \
              -H "Authorization: Bearer $DISPATCH_TOKEN" \
              "https://api.github.com/repos/${SOURCE_REPO}/releases/latest")
            RELEASE_TAG=$(LATEST_JSON="$LATEST_JSON" python -c "import json,os; print(json.loads(os.environ.get('LATEST_JSON','{}')).get('tag_name',''))")
          fi

          if [ -z "$RELEASE_TAG" ]; then
            echo "Unable to resolve release tag"
            exit 1
          fi

          VERSION="${RELEASE_TAG#v}"
          REPO_NAME="${SOURCE_REPO#*/}"
          RELEASE_ASSET="${REPO_NAME}-web-${VERSION}.zip"
          SOURCE_SHA="$RELEASE_TARGET_SHA"
          if [ -z "$SOURCE_SHA" ]; then
            SOURCE_SHA="$WORKFLOW_RUN_HEAD_SHA"
          fi
          if [ -z "$SOURCE_SHA" ]; then
            SOURCE_SHA="$SHA"
          fi

          PAYLOAD=$(cat <<JSON
          {
            "event_type": "$EVENT_TYPE",
            "client_payload": {
              "release_tag": "$RELEASE_TAG",
              "release_asset": "$RELEASE_ASSET",
              "source_repo": "$SOURCE_REPO",
              "source_sha": "$SOURCE_SHA"
            }
          }
          JSON
          )

          HTTP_CODE=$(curl -sS -o response.json -w "%{http_code}" \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer $DISPATCH_TOKEN" \
            "https://api.github.com/repos/${TARGET_REPO}/dispatches" \
            -d "$PAYLOAD")

          echo "Dispatch HTTP status: $HTTP_CODE"
          cat response.json || true

          if [ "$HTTP_CODE" -lt 200 ] || [ "$HTTP_CODE" -ge 300 ]; then
            echo "repository_dispatch failed"
            exit 1
          fi

          echo "repository_dispatch sent to ${TARGET_REPO}"
